name: Bug report
description: Template for bug reports.
labels: bug
body:
  - id: disclaimer
    type: markdown
    attributes:
      value: |
        Try to create a very concise title that's straight to the point.

        **THIS IS NOT A SUPPORT FORUM!** For support, first read the FAQ: https://xenios.jp/faq
        If your question wasn't answered there or you need help, proceed to #help in the Discord server: https://discord.gg/Q9mxZf9

        DO NOT CREATE ISSUES ABOUT SPECIFIC GAMES IN THIS REPOSITORY!
        A game specific issue would be e.g. "Game X crashes after you hit a character a certain way"
        A Xenia issue would be e.g. "Kernel export NtDoSomething does nothing"
        For specific games, visit https://xenios.jp/compatibility
  - id: validation
    type: checkboxes
    attributes:
      label: Validation
      options:
      - label: I've read the [FAQ](https://xenios.jp/faq).
        required: true
      - label: The build used is a current XeniOS or Xenia Edge build. (not UWP/MLBS/AlexVS/master/pull requests, etc)
        required: true
      - label: This issue isn't for tech support (help with Xenia).
        required: true
      - label: If this issue occurs in a specific game, I've done analysis to locate the faulty subsystem of the emulator and a potential reason in it.
        required: true
      - label: I've checked if this issue hasn't already been reported.
        required: true
      - label: 'My device meets the current platform requirements: https://xenios.jp/docs'
        required: true
      - label: '(If building) I have read the building doc: https://github.com/xenios-jp/XeniOS/blob/xenios/docs/building.md'
  - id: problem
    type: textarea
    attributes:
      label: Describe what's going wrong
    validations:
      required: true
  - id: what-should-happen
    type: textarea
    attributes:
      label: Describe what should happen
    validations:
      required: true
  - id: callstack
    type: textarea
    attributes:
      label: If applicable, provide a callstack here, especially for crashes
  - id: logfile
    type: textarea
    attributes:
      label: If applicable, upload a logfile and link it here
