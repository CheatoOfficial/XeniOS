name: Apple Publish

"on":
  workflow_dispatch:
    inputs:
      channel:
        description: "Publish channel"
        required: true
        default: "release"
        type: choice
        options:
          - "release"
          - "preview"
      stage:
        description: "Release stage"
        required: true
        default: "stable"
        type: choice
        options:
          - "stable"
          - "alpha"
          - "beta"
          - "rc"
      version:
        description: "Marketing version override (optional)"
        required: false
        type: string
      build_number:
        description: "Build number override (optional)"
        required: false
        type: string
  push:
    branches:
      - "preview"
      - "xenios"
    tags:
      - "v*"
      - "release-*"

permissions:
  contents: write

concurrency:
  group: "apple-publish-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build-apple:
    name: "Build ${{ matrix.label }}"
    runs-on: "${{ matrix.runner }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "iOS arm64"
            runner: "macos-15"
            artifact_name: "xenios_ios_iphone_ipad"
            artifact_path: "scratch/artifacts/xenios_ios_iphone_ipad.ipa"
            script_args: "--skip-macos-arm64 --skip-macos-x86_64"
            needs_qt: false
          - label: "macOS Apple Silicon"
            runner: "macos-15"
            artifact_name: "xenios_macos_apple_silicon"
            artifact_path: "scratch/artifacts/xenios_macos_apple_silicon.dmg"
            script_args: "--skip-ios --skip-macos-x86_64"
            needs_qt: true
          - label: "macOS Intel"
            runner: "macos-15-intel"
            artifact_name: "xenios_macos_intel"
            artifact_path: "scratch/artifacts/xenios_macos_intel.dmg"
            script_args: "--skip-ios --skip-macos-arm64"
            needs_qt: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve publish channel
        id: channel
        shell: bash
        run: |
          set -euo pipefail

          is_preview_ref() {
            [[ "${1}" == "refs/heads/preview" ]]
          }

          is_release_ref() {
            [[ "${1}" == "refs/heads/xenios" || "${1}" == refs/tags/v* || "${1}" == refs/tags/release-* ]]
          }

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            channel="${{ inputs.channel }}"
            if [[ "${channel}" == "preview" ]]; then
              is_preview_ref "${GITHUB_REF}" || {
                echo "::error::Manual preview publishes must run from refs/heads/preview (got ${GITHUB_REF})"
                exit 1
              }
            elif [[ "${channel}" == "release" ]]; then
              is_release_ref "${GITHUB_REF}" || {
                echo "::error::Manual release publishes must run from refs/heads/xenios or release tags (got ${GITHUB_REF})"
                exit 1
              }
            fi
          elif is_preview_ref "${GITHUB_REF}"; then
            channel="preview"
          elif is_release_ref "${GITHUB_REF}"; then
            channel="release"
          else
            echo "::error::Unsupported ref ${GITHUB_REF} for trusted Apple publish"
            exit 1
          fi
          case "${channel}" in
            release|preview)
              ;;
            *)
              echo "::error::Unsupported channel ${channel}"
              exit 1
              ;;
          esac
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Cache Qt 6.10.1
        if: "${{ matrix.needs_qt }}"
        uses: actions/cache@v4
        with:
          path: "~/Qt"
          key: "${{ runner.os }}-${{ runner.arch }}-qt6-6.10.1"
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-qt6-

      - name: Set up Apple build dependencies
        shell: bash
        run: |
          set -euo pipefail

          retry() {
            local attempts=0
            until "$@"; do
              attempts=$((attempts + 1))
              if [ "$attempts" -ge 5 ]; then
                return 1
              fi
              sleep 5
            done
          }

          brew install sdl2 ninja pipx

          if [[ "${{ matrix.needs_qt }}" == "true" ]]; then
            export PATH="$HOME/.local/bin:$PATH"
            if ! command -v aqt >/dev/null 2>&1; then
              pipx install aqtinstall
            fi
            if [ ! -d "$HOME/Qt/6.10.1/macos" ]; then
              aqt install-qt mac desktop 6.10.1 clang_64 -O "$HOME/Qt"
            fi
            echo "$HOME/Qt/6.10.1/macos/bin" >> "$GITHUB_PATH"
            echo "CMAKE_PREFIX_PATH=$HOME/Qt/6.10.1/macos" >> "$GITHUB_ENV"
            echo "QT_DIR=$HOME/Qt/6.10.1/macos" >> "$GITHUB_ENV"
          fi

          retry git submodule update --init --depth=1 -j"$(sysctl -n hw.ncpu)" \
            $(grep -oE 'path = .+' .gitmodules | sed 's/path = //' | grep -v 'premake-androidndk\|premake-export-compile-commands')
          retry git -C third_party/DirectXShaderCompiler submodule update --init --depth=1 \
            external/SPIRV-Headers external/SPIRV-Tools

          ./xenia-build.py premake
          ./xenia-build.py fetchdata

      - name: Build trusted artifact
        shell: bash
        env:
          XENIOS_BUILD_ATTESTATION_KEY: "${{ secrets.XENIOS_BUILD_ATTESTATION_KEY }}"
          XENIOS_BUILD_ATTESTATION_KEY_ID: "${{ secrets.XENIOS_BUILD_ATTESTATION_KEY_ID }}"
          VERSION_OVERRIDE: "${{ inputs.version }}"
          BUILD_NUMBER_OVERRIDE: "${{ inputs.build_number }}"
          STAGE_OVERRIDE: "${{ inputs.stage }}"
        run: |
          set -euo pipefail
          if [ -z "${XENIOS_BUILD_ATTESTATION_KEY}" ]; then
            echo "::error::XENIOS_BUILD_ATTESTATION_KEY is not configured"
            exit 1
          fi

          args=(--channel "${{ steps.channel.outputs.channel }}")
          if [ -n "${VERSION_OVERRIDE}" ]; then
            args+=(--version "${VERSION_OVERRIDE}")
          fi
          if [ -n "${BUILD_NUMBER_OVERRIDE}" ]; then
            args+=(--build-number "${BUILD_NUMBER_OVERRIDE}")
          fi
          if [ -n "${STAGE_OVERRIDE}" ]; then
            args+=(--stage "${STAGE_OVERRIDE}")
          fi

          IFS=' ' read -r -a extra_args <<< "${{ matrix.script_args }}"
          ./tools/build_apple_release.sh "${args[@]}" "${extra_args[@]}"

          test -f "${{ matrix.artifact_path }}"

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.artifact_name }}"
          path: "${{ matrix.artifact_path }}"
          if-no-files-found: error

  publish:
    name: Publish release and xenios.jp manifests
    needs:
      - build-apple
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve publish channel
        id: channel
        shell: bash
        run: |
          set -euo pipefail

          is_preview_ref() {
            [[ "${1}" == "refs/heads/preview" ]]
          }

          is_release_ref() {
            [[ "${1}" == "refs/heads/xenios" || "${1}" == refs/tags/v* || "${1}" == refs/tags/release-* ]]
          }

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            channel="${{ inputs.channel }}"
            if [[ "${channel}" == "preview" ]]; then
              is_preview_ref "${GITHUB_REF}" || {
                echo "::error::Manual preview publishes must run from refs/heads/preview (got ${GITHUB_REF})"
                exit 1
              }
            elif [[ "${channel}" == "release" ]]; then
              is_release_ref "${GITHUB_REF}" || {
                echo "::error::Manual release publishes must run from refs/heads/xenios or release tags (got ${GITHUB_REF})"
                exit 1
              }
            fi
          elif is_preview_ref "${GITHUB_REF}"; then
            channel="preview"
          elif is_release_ref "${GITHUB_REF}"; then
            channel="release"
          else
            echo "::error::Unsupported ref ${GITHUB_REF} for trusted Apple publish"
            exit 1
          fi
          case "${channel}" in
            release|preview)
              ;;
            *)
              echo "::error::Unsupported channel ${channel}"
              exit 1
              ;;
          esac
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: "xenios_ios_iphone_ipad"
          path: "artifacts/ios"

      - name: Download macOS Apple Silicon artifact
        uses: actions/download-artifact@v4
        with:
          name: "xenios_macos_apple_silicon"
          path: "artifacts/macos-arm64"

      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: "xenios_macos_intel"
          path: "artifacts/macos-x86_64"

      - name: Compute publish metadata
        id: metadata
        shell: bash
        env:
          CHANNEL: "${{ steps.channel.outputs.channel }}"
          VERSION_OVERRIDE: "${{ inputs.version }}"
          BUILD_NUMBER_OVERRIDE: "${{ inputs.build_number }}"
          STAGE_OVERRIDE: "${{ inputs.stage }}"
        run: |
          set -euo pipefail
          args=(--channel "${CHANNEL}")
          if [ -n "${VERSION_OVERRIDE}" ]; then
            args+=(--version "${VERSION_OVERRIDE}")
          fi
          if [ -n "${BUILD_NUMBER_OVERRIDE}" ]; then
            args+=(--build-number "${BUILD_NUMBER_OVERRIDE}")
          fi
          if [ -n "${STAGE_OVERRIDE}" ]; then
            args+=(--stage "${STAGE_OVERRIDE}")
          fi
          args+=(--print-metadata)
          ./tools/build_apple_release.sh "${args[@]}" > build-metadata.env

          while IFS='=' read -r key value; do
            case "$key" in
              channel|stage|version|build_number|commit_short|issued_at|display_label|ios_build_id|macos_build_id)
                echo "${key}=${value}" >> "$GITHUB_OUTPUT"
                ;;
            esac
          done < build-metadata.env

      - name: Resolve release identity
        id: release
        shell: bash
        env:
          CHANNEL: "${{ steps.metadata.outputs.channel }}"
          STAGE: "${{ steps.metadata.outputs.stage }}"
          VERSION: "${{ steps.metadata.outputs.version }}"
          BUILD_NUMBER: "${{ steps.metadata.outputs.build_number }}"
        run: |
          set -euo pipefail

          stage_suffix=""
          if [[ -n "${STAGE}" && "${STAGE}" != "stable" ]]; then
            stage_suffix="-${STAGE}"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF_NAME}"
          elif [[ "${CHANNEL}" == "preview" ]]; then
            release_tag="preview-v${VERSION}-build-${BUILD_NUMBER}${stage_suffix}"
          else
            release_tag="release-v${VERSION}-build-${BUILD_NUMBER}${stage_suffix}"
          fi

          if [[ "${CHANNEL}" == "preview" ]]; then
            prerelease="true"
          else
            prerelease="false"
          fi

          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        id: github_release
        shell: bash
        env:
          GH_TOKEN: "${{ github.token }}"
          DISPLAY_LABEL: "${{ steps.metadata.outputs.display_label }}"
          CHANNEL: "${{ steps.metadata.outputs.channel }}"
          STAGE: "${{ steps.metadata.outputs.stage }}"
          VERSION: "${{ steps.metadata.outputs.version }}"
          BUILD_NUMBER: "${{ steps.metadata.outputs.build_number }}"
          COMMIT_SHORT: "${{ steps.metadata.outputs.commit_short }}"
          PUBLISHED_AT: "${{ steps.metadata.outputs.issued_at }}"
          RELEASE_TAG: "${{ steps.release.outputs.tag }}"
          PRERELEASE: "${{ steps.release.outputs.prerelease }}"
        run: |
          set -euo pipefail

          {
            printf '# %s\n\n' "${DISPLAY_LABEL}"
            printf -- '- Channel: %s\n' "${CHANNEL}"
            printf -- '- Stage: %s\n' "${STAGE}"
            printf -- '- Version: %s\n' "${VERSION}"
            printf -- '- Build number: %s\n' "${BUILD_NUMBER}"
            printf -- '- Commit: %s\n' "${COMMIT_SHORT}"
            printf -- '- Published at: %s\n' "${PUBLISHED_AT}"
            printf -- '- Source ref: %s\n' "${GITHUB_REF}"
          } > release-notes.md

          jq -n \
            --arg tag "${RELEASE_TAG}" \
            --arg target "${GITHUB_SHA}" \
            --arg name "${DISPLAY_LABEL}" \
            --arg body "$(cat release-notes.md)" \
            --argjson prerelease "${PRERELEASE}" \
            '{
              tag_name: $tag,
              target_commitish: $target,
              name: $name,
              body: $body,
              draft: false,
              prerelease: $prerelease
            } + (if $prerelease then {} else {make_latest: "true"} end)' \
            > release-payload.json

          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.id' 2>/dev/null || true)"

          if [ -n "${release_id}" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              --method PATCH \
              --input release-payload.json \
              >/dev/null
          else
            gh api "repos/${GITHUB_REPOSITORY}/releases" \
              --method POST \
              --input release-payload.json \
              >/dev/null
          fi

          gh release upload "${RELEASE_TAG}" \
            artifacts/ios/xenios_ios_iphone_ipad.ipa \
            artifacts/macos-arm64/xenios_macos_apple_silicon.dmg \
            artifacts/macos-x86_64/xenios_macos_intel.dmg \
            --clobber

          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" > release.json

          echo "html_url=$(jq -r '.html_url' release.json)" >> "$GITHUB_OUTPUT"
          echo "ios_download_url=$(jq -r '.assets[] | select(.name == \"xenios_ios_iphone_ipad.ipa\") | .browser_download_url' release.json)" >> "$GITHUB_OUTPUT"
          echo "macos_arm64_download_url=$(jq -r '.assets[] | select(.name == \"xenios_macos_apple_silicon.dmg\") | .browser_download_url' release.json)" >> "$GITHUB_OUTPUT"
          echo "macos_x86_64_download_url=$(jq -r '.assets[] | select(.name == \"xenios_macos_intel.dmg\") | .browser_download_url' release.json)" >> "$GITHUB_OUTPUT"

      - name: Check out xenios.jp
        uses: actions/checkout@v4
        with:
          repository: "xenios-jp/xenios.jp"
          ref: "main"
          path: "xenios-website"
          token: "${{ secrets.XENIOS_WEBSITE_PAT }}"
          fetch-depth: 0

      - name: Update xenios.jp build manifests
        shell: bash
        env:
          CHANNEL: "${{ steps.metadata.outputs.channel }}"
          RELEASE_URL: "${{ steps.github_release.outputs.html_url }}"
          IOS_DOWNLOAD_URL: "${{ steps.github_release.outputs.ios_download_url }}"
          MACOS_ARM64_DOWNLOAD_URL: "${{ steps.github_release.outputs.macos_arm64_download_url }}"
          MACOS_X86_64_DOWNLOAD_URL: "${{ steps.github_release.outputs.macos_x86_64_download_url }}"
        run: |
          set -euo pipefail
          python3 tools/update_website_build_manifests.py \
            --website-repo "${GITHUB_WORKSPACE}/xenios-website" \
            --metadata-file build-metadata.env \
            --channel "${CHANNEL}" \
            --release-url "${RELEASE_URL}" \
            --ios-ipa "${GITHUB_WORKSPACE}/artifacts/ios/xenios_ios_iphone_ipad.ipa" \
            --ios-download-url "${IOS_DOWNLOAD_URL}" \
            --macos-arm64-dmg "${GITHUB_WORKSPACE}/artifacts/macos-arm64/xenios_macos_apple_silicon.dmg" \
            --macos-arm64-download-url "${MACOS_ARM64_DOWNLOAD_URL}" \
            --macos-x86_64-dmg "${GITHUB_WORKSPACE}/artifacts/macos-x86_64/xenios_macos_intel.dmg" \
            --macos-x86_64-download-url "${MACOS_X86_64_DOWNLOAD_URL}"

      - name: Commit xenios.jp build manifests
        shell: bash
        env:
          DISPLAY_LABEL: "${{ steps.metadata.outputs.display_label }}"
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/xenios-website"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/release-builds.json data/builds-history.json
          if git diff --staged --quiet; then
            echo "No xenios.jp manifest changes"
            exit 0
          fi
          git commit -m "builds: publish ${DISPLAY_LABEL}"
          git push origin HEAD:main
