name: Sync upstreams

on:
  workflow_dispatch:
    inputs:
      xenia_edge_branch:
        description: xenia-edge branch to merge into main
        required: false
        default: edge
        type: string
      xenios_branch:
        description: xenios-jp/XeniOS branch to merge into main
        required: false
        default: xenios
        type: string
      killswitch_branch:
        description: KilIswitch/XeniOS branch to merge into main
        required: false
        default: xenios
        type: string
  schedule:
    - cron: "0 * * * *"

permissions:
  actions: write
  contents: write

concurrency:
  group: sync-upstreams
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream branches
        id: merge
        shell: bash
        run: |
          set -euo pipefail

          xenia_edge_branch="${{ github.event.inputs.xenia_edge_branch }}"
          xenios_branch="${{ github.event.inputs.xenios_branch }}"
          killswitch_branch="${{ github.event.inputs.killswitch_branch }}"

          if [ -z "${xenia_edge_branch}" ]; then
            xenia_edge_branch="edge"
          fi
          if [ -z "${xenios_branch}" ]; then
            xenios_branch="xenios"
          fi
          if [ -z "${killswitch_branch}" ]; then
            killswitch_branch="xenios"
          fi

          git remote remove xeniaedge 2>/dev/null || true
          git remote remove xeniosjp 2>/dev/null || true
          git remote remove killswitch 2>/dev/null || true
          git remote add xeniaedge https://github.com/has207/xenia-edge.git
          git remote add xeniosjp https://github.com/xenios-jp/XeniOS.git
          git remote add killswitch https://github.com/KilIswitch/XeniOS.git

          git fetch origin main
          git fetch xeniaedge "${xenia_edge_branch}"
          git fetch xeniosjp "${xenios_branch}"
          git fetch killswitch "${killswitch_branch}"

          git checkout -B main origin/main

          # Surface overlapping file edits between the upstream iOS branches so
          # the workflow tells us when xenios-jp and KilIswitch touched the
          # same files, even if our merge policy keeps the current fork stable.
          base_commit="$(git merge-base "xeniosjp/${xenios_branch}" "killswitch/${killswitch_branch}")"
          xenios_only="$(mktemp)"
          killswitch_only="$(mktemp)"
          git diff --name-only "${base_commit}..xeniosjp/${xenios_branch}" | sort -u > "${xenios_only}"
          git diff --name-only "${base_commit}..killswitch/${killswitch_branch}" | sort -u > "${killswitch_only}"
          overlap="$(comm -12 "${xenios_only}" "${killswitch_only}" || true)"
          rm -f "${xenios_only}" "${killswitch_only}"

          if [ -n "${overlap}" ]; then
            echo "::warning::xenios-jp and KilIswitch both changed these paths:"
            while IFS= read -r path; do
              [ -n "${path}" ] || continue
              echo "::warning::  ${path}"
            done <<< "${overlap}"
          fi

          restore_local_ios_build_surface() {
            local preserve_paths=()
            while IFS= read -r path; do
              [ -n "${path}" ] || continue
              preserve_paths+=("${path}")
            done <<'EOF'
.github/workflows
.gitmodules
premake5.lua
src/xenia/apu/nop/premake5.lua
src/xenia/apu/sdl/premake5.lua
src/xenia/apu/xaudio2/premake5.lua
src/xenia/cpu/backend/x64/premake5.lua
src/xenia/debug/ui/premake5.lua
src/xenia/helper/sdl/premake5.lua
src/xenia/hid/nop/premake5.lua
src/xenia/hid/premake5.lua
src/xenia/hid/sdl/premake5.lua
src/xenia/hid/skylander
src/xenia/hid/winkey/premake5.lua
src/xenia/hid/xinput/premake5.lua
src/xenia/patcher/premake5.lua
src/xenia/premake5.lua
src/xenia/ui/vulkan/spirv_tools_context.cc
src/xenia/ui/vulkan/spirv_tools_context.h
src/xenia/vfs/premake5.lua
src/xenia/vfs/testing/premake5.lua
third_party/FFmpeg
third_party/SDL2-static.lua
third_party/aes_128.lua
third_party/asio.lua
third_party/capstone.lua
third_party/cxxopts.lua
third_party/discord-rpc.lua
third_party/disruptorplus
third_party/dxbc.lua
third_party/fmt.lua
third_party/glslang-spirv.lua
third_party/imgui.lua
third_party/metal-shader-converter.lua
third_party/miniaudio
third_party/miniaudio.lua
third_party/oaknut
third_party/premake-androidndk
third_party/premake-cmake
third_party/premake-core
third_party/premake-export-compile-commands
third_party/pugixml.lua
third_party/snappy.lua
third_party/tomlplusplus.lua
third_party/xxhash.lua
third_party/zlib-ng.lua
third_party/zstd.lua
tools/build
EOF

            # Keep this fork's iOS/premake build surface authoritative so
            # upstream CMake-focused syncs can't delete the files CI still
            # needs to generate and build iOS projects.
            git checkout origin/main -- "${preserve_paths[@]}"
          }

          merge_upstream() {
            local remote_name="$1"
            local branch_name="$2"
            local label="$3"

            if ! git merge --no-ff -X ours --no-commit "${remote_name}/${branch_name}"; then
              echo "::warning::Automatic merge from ${label} had conflicts; keeping main for conflicted files"
              mapfile -t conflict_files < <(git diff --name-only --diff-filter=U)
              if [ "${#conflict_files[@]}" -eq 0 ]; then
                echo "::error::Merge from ${label} failed without reporting conflicted files"
                git status --short
                git merge --abort || true
                exit 1
              fi

              for path in "${conflict_files[@]}"; do
                echo "::warning::conflict file: ${path}"
                if git cat-file -e ":2:${path}" 2>/dev/null; then
                  git checkout --ours -- "${path}" || true
                  git add -- "${path}"
                else
                  git rm -f -- "${path}" >/dev/null 2>&1 || true
                  git add -A -- "${path}" >/dev/null 2>&1 || true
                fi
              done

              if git diff --name-only --diff-filter=U | grep -q .; then
                echo "::error::Some merge conflicts from ${label} could not be resolved automatically"
                git status --short
                git merge --abort || true
                exit 1
              fi
            fi

            if [ ! -f .git/MERGE_HEAD ]; then
              echo "No changes from ${label}"
              return 0
            fi

            restore_local_ios_build_surface

            if git diff --cached --quiet && git diff --quiet; then
              git merge --abort || true
              echo "Merge from ${label} was empty after preserving local workflows"
              return 0
            fi

            git commit --no-edit
            echo "Merged ${label}"
          }

          # Merge order matters. Apply the lower-level emulator base first,
          # then upstream XeniOS, then the KilIswitch fork so iOS/touch
          # customizations stay on top.
          merge_upstream xeniaedge "${xenia_edge_branch}" "xenia-edge/${xenia_edge_branch}"
          merge_upstream xeniosjp "${xenios_branch}" "xenios-jp/XeniOS:${xenios_branch}"
          merge_upstream killswitch "${killswitch_branch}" "KilIswitch/XeniOS:${killswitch_branch}"

          if git diff --quiet origin/main...HEAD; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "has_changes=true" >> "${GITHUB_OUTPUT}"

      - name: Push synced main
        if: steps.merge.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push --force-with-lease origin HEAD:main

      - name: Trigger CI for synced main
        if: steps.merge.outputs.has_changes == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh workflow run CI.yml --ref main
