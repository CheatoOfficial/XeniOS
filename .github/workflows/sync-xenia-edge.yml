name: Sync xenia-edge

on:
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: xenia-edge branch to merge into main
        required: false
        default: metal/msc-pre-strict-clean-localized
        type: string
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-xenia-edge
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream branch
        id: merge
        shell: bash
        run: |
          set -euo pipefail

          upstream_branch="${{ github.event.inputs.upstream_branch }}"
          if [ -z "${upstream_branch}" ]; then
            upstream_branch="metal/msc-pre-strict-clean-localized"
          fi

          git remote remove xeniaedge 2>/dev/null || true
          git remote add xeniaedge https://github.com/has207/xenia-edge.git

          git fetch origin main
          git fetch xeniaedge "${upstream_branch}"

          git checkout -B main origin/main

          if ! git merge --no-ff -X ours --no-commit "xeniaedge/${upstream_branch}"; then
            echo "::error::Automatic merge from xeniaedge/${upstream_branch} failed"
            git status --short
            git merge --abort || true
            exit 1
          fi

          if [ ! -f .git/MERGE_HEAD ]; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "upstream_branch=${upstream_branch}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Keep the fork's workflow definitions authoritative on main. This
          # avoids GitHub App push restrictions around workflow-file changes.
          git checkout origin/main -- .github/workflows

          if git diff --cached --quiet && git diff --quiet; then
            git merge --abort || true
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "upstream_branch=${upstream_branch}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git commit --no-edit

          if git diff --quiet origin/main...HEAD; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "upstream_branch=${upstream_branch}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          echo "upstream_branch=${upstream_branch}" >> "${GITHUB_OUTPUT}"

      - name: Push synced main
        if: steps.merge.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push --force-with-lease origin HEAD:main
