name: CI

on:
  push:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@main
      - name: Setup
        env:
          LLVM_VERSION: 21
        run: |
          UBUNTU_BASE=$(lsb_release -cs)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo apt-add-repository "deb http://apt.llvm.org/${UBUNTU_BASE}/ llvm-toolchain-${UBUNTU_BASE}-$LLVM_VERSION main"
          sudo apt-get -y update
          sudo apt-get -y install clang-format-$LLVM_VERSION
      - name: Lint
        run: ./xenia-build.py lint --all

  build-linux-x86_64:
    name: Build Linux x86_64
    if: false
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Cache premake5
        id: cache-premake5
        uses: actions/cache@main
        with:
          path: tools/build/bin/premake5
          key: ${{ runner.os }}-${{ runner.arch }}-premake5-desktop-${{ hashFiles('.gitmodules', 'xenia-build.py', 'tools/build/premake.py') }}

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v3
        with:
          path: build/build_release
          key: ${{ runner.os }}-x86_64-ninja-${{ hashFiles('src/**', 'premake5.lua', 'third_party/**/*.lua') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-ninja-

      - name: Cache Qt6
        id: cache-qt-linux
        uses: actions/cache@v3
        with:
          path: /opt/Qt
          key: ${{ runner.os }}-qt6-6.10.1
          restore-keys: |
            ${{ runner.os }}-qt6-

      - name: Cache linuxdeploy tools
        id: cache-linuxdeploy
        uses: actions/cache@v3
        with:
          path: ~/linuxdeploy
          key: ${{ runner.os }}-linuxdeploy-tools
          restore-keys: |
            ${{ runner.os }}-linuxdeploy-

      - name: Cache submodules
        id: cache-submodules-linux
        uses: actions/cache@v3
        with:
          path: |
            third_party
            .git/modules/third_party
          key: ${{ runner.os }}-${{ runner.arch }}-submodules-${{ hashFiles('.gitmodules') }}-${{ hashFiles('.git/modules/third_party/*/HEAD') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-submodules-

      - name: Cache Vulkan SDK
        id: cache-vulkan-sdk-linux
        uses: actions/cache@v3
        with:
          path: ~/vulkan-sdk
          key: ${{ runner.os }}-vulkan-sdk-latest

      - name: Setup
        run: |
          UBUNTU_BASE=$(lsb_release -cs)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo apt-add-repository "deb http://apt.llvm.org/${UBUNTU_BASE}/ llvm-toolchain-${UBUNTU_BASE}-21 main"

          sudo apt-get -y update
          sudo apt-get -y install mesa-vulkan-drivers valgrind libc++-dev libc++abi-dev libsdl2-dev libvulkan-dev libx11-xcb-dev clang-21 ninja-build spirv-tools libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-cursor0 libxcb-shape0 libfontconfig1-dev libxtst-dev

          # Install Vulkan SDK
          if [ '${{ steps.cache-vulkan-sdk-linux.outputs.cache-hit }}' != 'true' ]; then
            wget -qO vulkan-sdk.tar.xz https://sdk.lunarg.com/sdk/download/latest/linux/vulkan-sdk.tar.xz
            mkdir -p ~/vulkan-sdk
            tar -xf vulkan-sdk.tar.xz -C ~/vulkan-sdk
          fi
          VULKAN_SDK_VERSION=$(ls ~/vulkan-sdk)
          echo "VULKAN_SDK=$HOME/vulkan-sdk/$VULKAN_SDK_VERSION/x86_64" >> $GITHUB_ENV
          echo "$HOME/vulkan-sdk/$VULKAN_SDK_VERSION/x86_64/bin" >> $GITHUB_PATH

          # Install Qt 6.10.1 via aqtinstall
          if [ '${{ steps.cache-qt-linux.outputs.cache-hit }}' != 'true' ]; then
            pip install aqtinstall
            echo "Available architectures for Qt 6.10.1:"
            aqt list-qt linux desktop --arch 6.10.1 || true
            aqt install-qt linux desktop 6.10.1 linux_gcc_64 -O /opt/Qt
          fi
          export PATH="/opt/Qt/6.10.1/gcc_64/bin:$PATH"
          export CMAKE_PREFIX_PATH="/opt/Qt/6.10.1/gcc_64"
          export PKG_CONFIG_PATH="/opt/Qt/6.10.1/gcc_64/lib/pkgconfig:$PKG_CONFIG_PATH"
          export QT_DIR="/opt/Qt/6.10.1/gcc_64"
          echo "/opt/Qt/6.10.1/gcc_64/bin" >> $GITHUB_PATH
          echo "CMAKE_PREFIX_PATH=/opt/Qt/6.10.1/gcc_64" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/opt/Qt/6.10.1/gcc_64/lib/pkgconfig" >> $GITHUB_ENV
          echo "QT_DIR=/opt/Qt/6.10.1/gcc_64" >> $GITHUB_ENV

          # Download linuxdeploy tools if not cached
          if [ '${{ steps.cache-linuxdeploy.outputs.cache-hit }}' != 'true' ]; then
            mkdir -p ~/linuxdeploy
            wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O ~/linuxdeploy/linuxdeploy
            wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage -O ~/linuxdeploy/linuxdeploy-plugin-qt
            wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage -O ~/linuxdeploy/linuxdeploy-plugin-appimage
            chmod +x ~/linuxdeploy/linuxdeploy ~/linuxdeploy/linuxdeploy-plugin-qt ~/linuxdeploy/linuxdeploy-plugin-appimage
          fi
          echo "$HOME/linuxdeploy" >> $GITHUB_PATH

          # Verify shader tools are available
          which glslangValidator && glslangValidator --version || echo "Warning: glslangValidator not found"
          which spirv-opt && spirv-opt --version || echo "Warning: spirv-opt not found"
          which spirv-dis || echo "Warning: spirv-dis not found"

          # Always update submodules so .git/modules is present even on cache hit
          git submodule update --init --depth=1 -j$(getconf _NPROCESSORS_ONLN) $(grep -oP '(?<=path = )(?!third_party\/(DirectXShaderCompiler|premake-(androidndk|export-compile-commands))).+' .gitmodules)

          # Always run premake to regenerate cmake files (lua files may have changed)
          if [ '${{ steps.cache-premake5.outputs.cache-hit }}' != 'true' ]; then
            mkdir -p tools/build/bin
            ./xenia-build.py premake
            if [ -x third_party/premake-core/bin/release/premake5 ]; then
              cp third_party/premake-core/bin/release/premake5 tools/build/bin/
              chmod +x tools/build/bin/premake5
            elif [ ! -x tools/build/bin/premake5 ]; then
              echo "::warning::premake5 bootstrap output not found; skipping premake cache population"
            fi
          else
            ./xenia-build.py premake
          fi

          # Fetch data repos (game-patches, optimized-settings)
          ./xenia-build.py fetchdata
      - name: Build
        env:
          CC: clang-21
          CXX: clang++-21
        run: ./xenia-build.py build --config=Release
      - name: Prepare artifacts
        id: prepare_artifacts
        run: |
          binary=build/bin/Linux-x86_64/Release/xenios
          if [ $(stat -c%s $binary) -le 100000 ]; then
            echo "::error::Binary is too small."
          fi
          chmod +x $binary
          mkdir -p artifacts/xenios

          # Use linuxdeploy to bundle Qt dependencies
          export QMAKE=/opt/Qt/6.10.1/gcc_64/bin/qmake
          export LD_LIBRARY_PATH=/opt/Qt/6.10.1/gcc_64/lib:$LD_LIBRARY_PATH

          # Install icons with proper naming for linuxdeploy
          mkdir -p artifacts/xenios/usr/share/icons/hicolor/16x16/apps
          mkdir -p artifacts/xenios/usr/share/icons/hicolor/32x32/apps
          mkdir -p artifacts/xenios/usr/share/icons/hicolor/48x48/apps
          mkdir -p artifacts/xenios/usr/share/icons/hicolor/64x64/apps
          mkdir -p artifacts/xenios/usr/share/icons/hicolor/128x128/apps
          mkdir -p artifacts/xenios/usr/share/icons/hicolor/256x256/apps
          mkdir -p artifacts/xenios/usr/share/icons/hicolor/512x512/apps
          mkdir -p artifacts/xenios/usr/share/icons/hicolor/1024x1024/apps

          cp assets/icon/16.png artifacts/xenios/usr/share/icons/hicolor/16x16/apps/xenios.png
          cp assets/icon/32.png artifacts/xenios/usr/share/icons/hicolor/32x32/apps/xenios.png
          cp assets/icon/48.png artifacts/xenios/usr/share/icons/hicolor/48x48/apps/xenios.png
          cp assets/icon/64.png artifacts/xenios/usr/share/icons/hicolor/64x64/apps/xenios.png
          cp assets/icon/128.png artifacts/xenios/usr/share/icons/hicolor/128x128/apps/xenios.png
          cp assets/icon/256.png artifacts/xenios/usr/share/icons/hicolor/256x256/apps/xenios.png
          cp assets/icon/512.png artifacts/xenios/usr/share/icons/hicolor/512x512/apps/xenios.png
          cp assets/icon/1024.png artifacts/xenios/usr/share/icons/hicolor/1024x1024/apps/xenios.png

          # Copy all necessary files (excluding build artifacts) next to the binary in AppDir
          mkdir -p artifacts/xenios/usr/bin
          # Copy directories (optimized_settings, game_patches, etc.)
          find build/bin/Linux-x86_64/Release -maxdepth 1 -type d ! -name Release -exec cp -r {} artifacts/xenios/usr/bin/ \;
          # Copy any additional runtime files if needed (currently just directories are copied)

          # Run linuxdeploy with Qt plugin to deploy all Qt dependencies and create AppImage
          export EXTRA_PLATFORM_PLUGINS="libqwayland.so"
          ~/linuxdeploy/linuxdeploy --appdir artifacts/xenios \
            --executable $binary \
            --desktop-file assets/xenios.desktop \
            --icon-file assets/icon/256.png \
            --plugin qt \
            --output appimage

          # linuxdeploy creates the AppImage in the current directory
          # Find and rename it to a standard name
          appimage_file=$(ls -1 *.AppImage | head -n1)
          if [ -z "$appimage_file" ]; then
            echo "::error::AppImage file not found after linuxdeploy"
            exit 1
          fi

          # Create final artifacts directory and move the AppImage there
          mkdir -p artifacts/release
          mv "$appimage_file" artifacts/release/xenios.AppImage
          chmod +x artifacts/release/xenios.AppImage

          # Also copy LICENSE
          cp LICENSE artifacts/release/
      - name: Upload Xenios Linux artifacts
        if: steps.prepare_artifacts.outcome == 'success'
        uses: actions/upload-artifact@main
        with:
          name: xenios_linux_x86_64
          path: artifacts/release
          if-no-files-found: error

  build-macos-arm64:
    name: Build macOS ARM64
    needs: lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Cache premake5
        id: cache-premake5
        uses: actions/cache@main
        with:
          path: tools/build/bin/premake5
          key: ${{ runner.os }}-${{ runner.arch }}-macos26-premake5-desktop-${{ hashFiles('.gitmodules', 'xenia-build.py', 'tools/build/premake.py') }}

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v3
        with:
          path: build/DerivedData
          key: ${{ runner.os }}-${{ runner.arch }}-macos26-arm64-deriveddata-${{ hashFiles('src/**', 'premake5.lua', 'third_party/**/*.lua', 'assets/apple/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-macos26-arm64-deriveddata-

      - name: Cache Qt6
        id: cache-qt-macos
        uses: actions/cache@v3
        with:
          path: ~/Qt
          key: ${{ runner.os }}-${{ runner.arch }}-macos26-qt6-6.10.1
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-macos26-qt6-

      - name: Cache submodules
        id: cache-submodules-macos
        uses: actions/cache@v3
        with:
          path: |
            third_party
            .git/modules/third_party
          key: ${{ runner.os }}-${{ runner.arch }}-desktop-submodules-${{ hashFiles('.gitmodules') }}-${{ hashFiles('.git/modules/third_party/*/HEAD') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-desktop-submodules-

      - name: Setup
        run: |
          retry() {
            local n=0
            until "$@"; do
              n=$((n+1))
              if [ $n -ge 5 ]; then
                return 1
              fi
              sleep 5
            done
          }

          xcode_app="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' ! -iname '*beta*' | sort -V | tail -n 1)"
          if [ -z "$xcode_app" ]; then
            xcode_app="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V | tail -n 1)"
          fi
          if [ -z "$xcode_app" ]; then
            echo "::error::Xcode 26 not found on runner"
            ls -1 /Applications | sed 's/^/  /'
            exit 1
          fi
          echo "DEVELOPER_DIR=$xcode_app/Contents/Developer" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$xcode_app/Contents/Developer"
          xcodebuild -version

          ensure_metal_toolchain() {
            if xcrun --find metal >/dev/null 2>&1 && xcrun --find metallib >/dev/null 2>&1; then
              xcrun --find metal
              xcrun --find metallib
              return 0
            fi

            echo "::notice::Installing Xcode MetalToolchain component"
            xcodebuild -showComponent MetalToolchain || true
            if ! retry xcodebuild -downloadComponent MetalToolchain; then
              retry sudo env DEVELOPER_DIR="$DEVELOPER_DIR" \
                xcodebuild -downloadComponent MetalToolchain
            fi
            xcodebuild -showComponent MetalToolchain || true

            if ! xcrun --find metal >/dev/null 2>&1 || ! xcrun --find metallib >/dev/null 2>&1; then
              echo "::error::Metal toolchain is still unavailable after installation"
              return 1
            fi

            xcrun --find metal
            xcrun --find metallib
          }

          ensure_metal_toolchain

          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60
          git config --global http.postBuffer 524288000

          # Install dependencies via Homebrew
          brew install sdl2 ninja pipx

          # Install Qt 6.10.1 via aqtinstall
          if [ '${{ steps.cache-qt-macos.outputs.cache-hit }}' != 'true' ]; then
            pipx install aqtinstall
            pipx ensurepath
            export PATH="$HOME/.local/bin:$PATH"
            aqt install-qt mac desktop 6.10.1 clang_64 -O ~/Qt
          fi
          export PATH="$HOME/Qt/6.10.1/macos/bin:$PATH"
          export CMAKE_PREFIX_PATH="$HOME/Qt/6.10.1/macos"
          export QT_DIR="$HOME/Qt/6.10.1/macos"
          echo "$HOME/Qt/6.10.1/macos/bin" >> $GITHUB_PATH
          echo "CMAKE_PREFIX_PATH=$HOME/Qt/6.10.1/macos" >> $GITHUB_ENV
          echo "QT_DIR=$HOME/Qt/6.10.1/macos" >> $GITHUB_ENV

          # Always update submodules so .git/modules is present even on cache hit
          retry git submodule update --init --depth=1 -j$(sysctl -n hw.ncpu) $(grep -oE 'path = .+' .gitmodules | sed 's/path = //' | grep -v 'premake-androidndk\|premake-export-compile-commands')
          # DirectXShaderCompiler has nested submodules needed for dxilconv
          retry git -C third_party/DirectXShaderCompiler submodule update --init --depth=1 external/SPIRV-Headers external/SPIRV-Tools
          # Restore non-submodule files in third_party/ that the submodule
          # cache may have overwritten with stale versions.
          git checkout -- third_party/*.lua

          if [ '${{ steps.cache-premake5.outputs.cache-hit }}' != 'true' ]; then
            mkdir -p tools/build/bin
            ./xenia-build.py premake
            if [ -x third_party/premake-core/bin/release/premake5 ]; then
              cp third_party/premake-core/bin/release/premake5 tools/build/bin/
              chmod +x tools/build/bin/premake5
            elif [ ! -x tools/build/bin/premake5 ]; then
              echo "::warning::premake5 bootstrap output not found; skipping premake cache population"
            fi
          else
            ./xenia-build.py premake
          fi

          # Fetch data repos (game-patches, optimized-settings)
          ./xenia-build.py fetchdata

      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: 15.0
        run: ./xenia-build.py build --config=Release --target=xenia-app --no_premake -- \
          MACOSX_DEPLOYMENT_TARGET=${MACOSX_DEPLOYMENT_TARGET}

      - name: Prepare artifacts
        id: prepare_artifacts
        run: |
          app_bundle="build/bin/Mac-ARM64/Release/XeniOS.app"
          if [ ! -d "$app_bundle" ]; then
            echo "::error::App bundle not found in build/bin/Mac-ARM64/Release"
            exit 1
          fi

          macdeployqt="$HOME/Qt/6.10.1/macos/bin/macdeployqt"
          if [ -x "$macdeployqt" ]; then
            "$macdeployqt" "$app_bundle" -always-overwrite -verbose=2 \
              -libpath=third_party/metal-shader-converter/lib \
              -libpath=third_party/DirectXShaderCompiler/build_dxilconv_macos/lib \
              -libpath=/opt/homebrew/opt/sdl2/lib \
              -libpath=/usr/local/opt/sdl2/lib
          else
            echo "::warning::macdeployqt not found at $macdeployqt"
          fi

          if [ -f third_party/metal-shader-converter/lib/libmetalirconverter.dylib ]; then
            cp -f third_party/metal-shader-converter/lib/libmetalirconverter.dylib \
              "$app_bundle/Contents/Frameworks/" || true
          fi
          if [ -f third_party/DirectXShaderCompiler/build_dxilconv_macos/lib/libdxilconv.dylib ]; then
            cp -f third_party/DirectXShaderCompiler/build_dxilconv_macos/lib/libdxilconv.dylib \
              "$app_bundle/Contents/Frameworks/" || true
          fi

          ./tools/build_apple_release.sh --platform macos --stamp-bundle "$app_bundle"

          main_exe_name="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_bundle/Contents/Info.plist" 2>/dev/null || echo xenios)"
          main_exe="$app_bundle/Contents/MacOS/$main_exe_name"
          if [ -f "$main_exe" ]; then
            codesign --remove-signature "$main_exe" || true
          fi
          codesign --remove-signature "$app_bundle" || true
          frameworks_dir="$app_bundle/Contents/Frameworks"
          plugins_dir="$app_bundle/Contents/PlugIns"
          if [ -d "$frameworks_dir" ]; then
            find "$frameworks_dir" -maxdepth 2 -name "*.framework" -type d -print0 | \
              xargs -0 -I{} codesign --remove-signature "{}" || true
            find "$frameworks_dir" -name "*.dylib" -type f -print0 | \
              xargs -0 -I{} codesign --remove-signature "{}" || true
            find "$frameworks_dir" -maxdepth 2 -name "*.framework" -type d -print0 | \
              xargs -0 -I{} codesign --force --sign - --timestamp=none "{}"
            find "$frameworks_dir" -name "*.dylib" -type f -print0 | \
              xargs -0 -I{} codesign --force --sign - --timestamp=none "{}"
          fi
          if [ -d "$plugins_dir" ]; then
            find "$plugins_dir" -name "*.dylib" -type f -print0 | \
              xargs -0 -I{} codesign --remove-signature "{}" || true
            find "$plugins_dir" -name "*.dylib" -type f -print0 | \
              xargs -0 -I{} codesign --force --sign - --timestamp=none "{}"
          fi
          if [ -f "$main_exe" ]; then
            codesign --force --sign - --timestamp=none "$main_exe"
          fi
          codesign --force --deep --timestamp=none \
            --sign - --entitlements xenia.entitlements "$app_bundle"
          xattr -cr "$app_bundle"

          mkdir -p artifacts/release

          # Create a DMG
          mkdir -p dmg_contents
          cp -R "$app_bundle" dmg_contents/
          cp LICENSE dmg_contents/
          ln -s /Applications dmg_contents/Applications

          hdiutil create -volname "XeniOS" -srcfolder dmg_contents -ov -format UDZO "artifacts/release/xenios_macos_apple_silicon.dmg"
          rm -rf dmg_contents

      - name: Upload macOS Apple Silicon artifacts
        if: steps.prepare_artifacts.outcome == 'success'
        uses: actions/upload-artifact@main
        with:
          name: xenios_macos_arm64
          path: artifacts/release
          if-no-files-found: error

  build-ios-arm64:
    name: Build iOS ARM64
    needs: lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Cache premake5
        id: cache-premake5
        uses: actions/cache@main
        with:
          path: tools/build/bin/premake5
          key: ${{ runner.os }}-${{ runner.arch }}-macos26-premake5-ios-${{ hashFiles('.gitmodules', 'xenia-build.py', 'tools/build/premake.py') }}

      - name: Cache build output
        id: cache-build-ios
        uses: actions/cache@v3
        with:
          path: build/DerivedData
          key: ${{ runner.os }}-${{ runner.arch }}-macos26-ios-deriveddata-${{ hashFiles('src/**', 'premake5.lua', 'third_party/**/*.lua', 'assets/apple/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-macos26-ios-deriveddata-

      - name: Cache submodules
        id: cache-submodules-ios
        uses: actions/cache@v3
        with:
          path: |
            third_party
            .git/modules/third_party
          key: ${{ runner.os }}-${{ runner.arch }}-submodules-ios-v2-${{ hashFiles('.gitmodules') }}-${{ hashFiles('.git/modules/third_party/*/HEAD') }}

      - name: Setup
        env:
          XE_TARGET_IOS: "1"
        run: |
          retry() {
            local n=0
            until "$@"; do
              n=$((n+1))
              if [ $n -ge 5 ]; then
                return 1
              fi
              sleep 5
            done
          }

          xcode_app="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' ! -iname '*beta*' | sort -V | tail -n 1)"
          if [ -z "$xcode_app" ]; then
            xcode_app="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V | tail -n 1)"
          fi
          if [ -z "$xcode_app" ]; then
            echo "::error::Xcode 26 not found on runner"
            ls -1 /Applications | sed 's/^/  /'
            exit 1
          fi
          echo "DEVELOPER_DIR=$xcode_app/Contents/Developer" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$xcode_app/Contents/Developer"
          xcodebuild -version

          ensure_metal_toolchain() {
            if xcrun --find metal >/dev/null 2>&1 && xcrun --find metallib >/dev/null 2>&1; then
              xcrun --find metal
              xcrun --find metallib
              return 0
            fi

            echo "::notice::Installing Xcode MetalToolchain component"
            xcodebuild -showComponent MetalToolchain || true
            if ! retry xcodebuild -downloadComponent MetalToolchain; then
              retry sudo env DEVELOPER_DIR="$DEVELOPER_DIR" \
                xcodebuild -downloadComponent MetalToolchain
            fi
            xcodebuild -showComponent MetalToolchain || true

            if ! xcrun --find metal >/dev/null 2>&1 || ! xcrun --find metallib >/dev/null 2>&1; then
              echo "::error::Metal toolchain is still unavailable after installation"
              return 1
            fi

            xcrun --find metal
            xcrun --find metallib
          }

          ensure_metal_toolchain

          ensure_ios_platform() {
            if xcodebuild -showsdks | grep -qE '^[[:space:]]+iOS '; then
              xcodebuild -showsdks | sed -n '/^iOS SDKs:/,/^iOS Simulator SDKs:/p'
              return 0
            fi

            echo "::notice::Installing Xcode iOS platform"
            if ! retry xcodebuild -downloadPlatform iOS; then
              retry sudo env DEVELOPER_DIR="$DEVELOPER_DIR" \
                xcodebuild -downloadPlatform iOS
            fi

            if ! xcodebuild -showsdks | grep -qE '^[[:space:]]+iOS '; then
              echo "::error::iOS SDK is still unavailable after platform installation"
              return 1
            fi

            xcodebuild -showsdks | sed -n '/^iOS SDKs:/,/^iOS Simulator SDKs:/p'
          }

          ensure_ios_platform

          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60
          git config --global http.postBuffer 524288000

          # No SDL2/Qt/Vulkan needed for iOS library builds
          brew install ninja

          # Update submodules (no DirectXShaderCompiler needed for iOS)
          retry git submodule update --init --depth=1 -j$(sysctl -n hw.ncpu) $(grep -oE 'path = .+' .gitmodules | sed 's/path = //' | grep -v 'premake-androidndk\|premake-export-compile-commands\|DirectXShaderCompiler')
          # Restore non-submodule files in third_party/ that the submodule
          # cache may have overwritten with stale versions.
          git checkout -- third_party/*.lua

          # Remove any stale premake5 binary left in the submodule tree by
          # a previous cache run.  premake.py checks this path first and
          # would use an outdated binary that doesn't support --os=ios.
          rm -f third_party/premake-core/bin/release/premake5

          # Build premake5 as a macOS host tool if not cached, then generate
          # iOS project files.
          mkdir -p tools/build/bin
          if [ '${{ steps.cache-premake5.outputs.cache-hit }}' != 'true' ]; then
            # Build premake5 from source (host macOS binary).
            cd third_party/premake-core
            make -f Bootstrap.mak PLATFORM=ARM64 osx
            cd ../..
            cp third_party/premake-core/bin/release/premake5 tools/build/bin/
            chmod +x tools/build/bin/premake5
            echo "premake5 built and copied to tools/build/bin/"
          else
            echo "premake5 restored from cache"
          fi
          # Verify premake5 is usable before proceeding.
          if [ ! -x tools/build/bin/premake5 ]; then
            echo "ERROR: tools/build/bin/premake5 not found or not executable"
            ls -la tools/build/bin/ || true
            exit 1
          fi
          tools/build/bin/premake5 --version

          # Create a sentinel file so premake Lua scripts can reliably
          # detect an iOS build even if --os=ios handling is broken.
          touch .ios_target
          ./xenia-build.py premake --target_os=ios

      - name: Build
        env:
          IPHONEOS_DEPLOYMENT_TARGET: 16.0
        run: |
          # Build the full iOS app target (no code signing on CI).
          # Use --no_premake since premake was already run in the Setup step.
          ./xenia-build.py build --config=Release --target_os=ios --no_premake -- \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            CODE_SIGN_IDENTITY= \
            IPHONEOS_DEPLOYMENT_TARGET=${IPHONEOS_DEPLOYMENT_TARGET}

      - name: Prepare artifacts
        id: prepare_artifacts
        run: |
          app_bundle="$(find build/bin/iOS-ARM64/Release -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$app_bundle" ]; then
            echo "::error::iOS app bundle not found in build/bin/iOS-ARM64/Release"
            exit 1
          fi

          ./tools/build_apple_release.sh --platform ios --stamp-bundle "$app_bundle"

          xattr -cr "$app_bundle"
          if ! codesign --force --sign - --timestamp=none --entitlements xenia_ios.entitlements "$app_bundle"; then
            echo "::warning::Ad-hoc signing failed; packaging unsigned app bundle"
          fi

          mkdir -p artifacts/release
          ipa_out="$PWD/artifacts/release/xenios_ios_iphone_ipad.ipa"
          tmp="$(mktemp -d "${TMPDIR:-/tmp}/xenios_ci_ipa.XXXXXX")"
          mkdir -p "$tmp/Payload"
          ditto "$app_bundle" "$tmp/Payload/$(basename "$app_bundle")"
          (
            cd "$tmp"
            ditto -c -k --sequesterRsrc --keepParent Payload "$ipa_out"
          )
          rm -rf "$tmp"

      - name: Upload iOS ARM64 artifacts
        if: steps.prepare_artifacts.outcome == 'success'
        uses: actions/upload-artifact@main
        with:
          name: xenios_ios_arm64
          path: artifacts/release
          if-no-files-found: error

  build-macos-x86_64:
    name: Build macOS x86_64
    needs: lint
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Cache premake5
        id: cache-premake5
        uses: actions/cache@main
        with:
          path: tools/build/bin/premake5
          key: ${{ runner.os }}-${{ runner.arch }}-macos26-premake5-desktop-${{ hashFiles('.gitmodules', 'xenia-build.py', 'tools/build/premake.py') }}

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v3
        with:
          path: build/DerivedData
          key: ${{ runner.os }}-${{ runner.arch }}-macos26-x86_64-deriveddata-${{ hashFiles('src/**', 'premake5.lua', 'third_party/**/*.lua', 'assets/apple/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-macos26-x86_64-deriveddata-

      - name: Cache Qt6
        id: cache-qt-macos
        uses: actions/cache@v3
        with:
          path: ~/Qt
          key: ${{ runner.os }}-${{ runner.arch }}-macos26-qt6-6.10.1
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-macos26-qt6-

      - name: Cache submodules
        id: cache-submodules-macos
        uses: actions/cache@v3
        with:
          path: |
            third_party
            .git/modules/third_party
          key: ${{ runner.os }}-${{ runner.arch }}-desktop-submodules-${{ hashFiles('.gitmodules') }}-${{ hashFiles('.git/modules/third_party/*/HEAD') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-desktop-submodules-

      - name: Setup
        run: |
          retry() {
            local n=0
            until "$@"; do
              n=$((n+1))
              if [ $n -ge 5 ]; then
                return 1
              fi
              sleep 5
            done
          }

          xcode_app="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' ! -iname '*beta*' | sort -V | tail -n 1)"
          if [ -z "$xcode_app" ]; then
            xcode_app="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V | tail -n 1)"
          fi
          if [ -z "$xcode_app" ]; then
            echo "::error::Xcode 26 not found on runner"
            ls -1 /Applications | sed 's/^/  /'
            exit 1
          fi
          echo "DEVELOPER_DIR=$xcode_app/Contents/Developer" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$xcode_app/Contents/Developer"
          xcodebuild -version

          ensure_metal_toolchain() {
            if xcrun --find metal >/dev/null 2>&1 && xcrun --find metallib >/dev/null 2>&1; then
              xcrun --find metal
              xcrun --find metallib
              return 0
            fi

            echo "::notice::Installing Xcode MetalToolchain component"
            xcodebuild -showComponent MetalToolchain || true
            if ! retry xcodebuild -downloadComponent MetalToolchain; then
              retry sudo env DEVELOPER_DIR="$DEVELOPER_DIR" \
                xcodebuild -downloadComponent MetalToolchain
            fi
            xcodebuild -showComponent MetalToolchain || true

            if ! xcrun --find metal >/dev/null 2>&1 || ! xcrun --find metallib >/dev/null 2>&1; then
              echo "::error::Metal toolchain is still unavailable after installation"
              return 1
            fi

            xcrun --find metal
            xcrun --find metallib
          }

          ensure_metal_toolchain

          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60
          git config --global http.postBuffer 524288000

          # Install dependencies via Homebrew
          brew install sdl2 ninja pipx
          sdl2_prefix="$(brew --prefix sdl2)"
          echo "SDL2_DIR=$sdl2_prefix" >> "$GITHUB_ENV"
          export SDL2_DIR="$sdl2_prefix"

          # Install Qt 6.10.1 via aqtinstall
          if [ '${{ steps.cache-qt-macos.outputs.cache-hit }}' != 'true' ]; then
            pipx install aqtinstall
            pipx ensurepath
            export PATH="$HOME/.local/bin:$PATH"
            aqt install-qt mac desktop 6.10.1 clang_64 -O ~/Qt
          fi
          export PATH="$HOME/Qt/6.10.1/macos/bin:$PATH"
          export CMAKE_PREFIX_PATH="$HOME/Qt/6.10.1/macos"
          export QT_DIR="$HOME/Qt/6.10.1/macos"
          echo "$HOME/Qt/6.10.1/macos/bin" >> $GITHUB_PATH
          echo "CMAKE_PREFIX_PATH=$HOME/Qt/6.10.1/macos" >> $GITHUB_ENV
          echo "QT_DIR=$HOME/Qt/6.10.1/macos" >> $GITHUB_ENV

          if [ "$(uname -m)" != "x86_64" ]; then
            echo "::error::macOS x86_64 packaging job requires an Intel runner"
            exit 1
          fi

          qtcore_binary="$HOME/Qt/6.10.1/macos/lib/QtCore.framework/QtCore"
          sdl2_binary="$SDL2_DIR/lib/libSDL2-2.0.0.dylib"
          for binary in "$qtcore_binary" "$sdl2_binary"; do
            if [ ! -f "$binary" ]; then
              echo "::error::Required dependency not found: $binary"
              exit 1
            fi
            if ! lipo -archs "$binary" | tr ' ' '\n' | grep -qx 'x86_64'; then
              echo "::error::Dependency does not contain an x86_64 slice: $binary"
              lipo -archs "$binary" || true
              exit 1
            fi
            minos="$(otool -l "$binary" | awk '
              $1 == "cmd" && $2 == "LC_BUILD_VERSION" { in_build = 1; next }
              in_build && $1 == "platform" { platform = $2; next }
              in_build && $1 == "minos" && platform == "1" { print $2; exit }
            ')"
            if [ -n "$minos" ]; then
              case "$minos" in
                10.*|11.*|12.*|13.*|14.*|15.*) ;;
                *)
                  echo "::error::Dependency requires macOS $minos, expected macOS 15.x compatibility: $binary"
                  exit 1
                  ;;
              esac
            fi
          done

          # Always update submodules so .git/modules is present even on cache hit
          retry git submodule update --init --depth=1 -j$(sysctl -n hw.ncpu) $(grep -oE 'path = .+' .gitmodules | sed 's/path = //' | grep -v 'premake-androidndk\|premake-export-compile-commands')
          # DirectXShaderCompiler has nested submodules needed for dxilconv
          retry git -C third_party/DirectXShaderCompiler submodule update --init --depth=1 external/SPIRV-Headers external/SPIRV-Tools
          # Restore non-submodule files in third_party/ that the submodule
          # cache may have overwritten with stale versions.
          git checkout -- third_party/*.lua

          if [ '${{ steps.cache-premake5.outputs.cache-hit }}' != 'true' ]; then
            mkdir -p tools/build/bin
            ./xenia-build.py premake -- --mac-x86_64
            if [ -x third_party/premake-core/bin/release/premake5 ]; then
              cp third_party/premake-core/bin/release/premake5 tools/build/bin/
              chmod +x tools/build/bin/premake5
            elif [ ! -x tools/build/bin/premake5 ]; then
              echo "::warning::premake5 bootstrap output not found; skipping premake cache population"
            fi
          else
            ./xenia-build.py premake -- --mac-x86_64
          fi

          # Fetch data repos (game-patches, optimized-settings)
          ./xenia-build.py fetchdata

      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: 15.0
        run: ./xenia-build.py build --config=Release --target=xenia-app --arch=x86_64 --no_premake -- \
          MACOSX_DEPLOYMENT_TARGET=${MACOSX_DEPLOYMENT_TARGET}

      - name: Prepare artifacts
        id: prepare_artifacts
        run: |
          app_bundle="build/bin/Mac-x86_64/Release/XeniOS.app"
          if [ ! -d "$app_bundle" ]; then
            echo "::error::App bundle not found in build/bin/Mac-x86_64/Release"
            exit 1
          fi

          macdeployqt="$HOME/Qt/6.10.1/macos/bin/macdeployqt"
          if [ -x "$macdeployqt" ]; then
            "$macdeployqt" "$app_bundle" -always-overwrite -verbose=2 \
              -libpath=third_party/metal-shader-converter/lib \
              -libpath=third_party/DirectXShaderCompiler/build_dxilconv_macos_x86_64/lib \
              -libpath=/opt/homebrew/opt/sdl2/lib \
              -libpath=/usr/local/opt/sdl2/lib
          else
            echo "::warning::macdeployqt not found at $macdeployqt"
          fi

          if [ -f third_party/metal-shader-converter/lib/libmetalirconverter.dylib ]; then
            cp -f third_party/metal-shader-converter/lib/libmetalirconverter.dylib \
              "$app_bundle/Contents/Frameworks/" || true
          fi
          if [ -f third_party/DirectXShaderCompiler/build_dxilconv_macos_x86_64/lib/libdxilconv.dylib ]; then
            cp -f third_party/DirectXShaderCompiler/build_dxilconv_macos_x86_64/lib/libdxilconv.dylib \
              "$app_bundle/Contents/Frameworks/" || true
          fi

          ./tools/build_apple_release.sh --platform macos --stamp-bundle "$app_bundle"

          main_exe_name="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_bundle/Contents/Info.plist" 2>/dev/null || echo xenios)"
          main_exe="$app_bundle/Contents/MacOS/$main_exe_name"
          if [ -f "$main_exe" ]; then
            codesign --remove-signature "$main_exe" || true
          fi
          codesign --remove-signature "$app_bundle" || true
          frameworks_dir="$app_bundle/Contents/Frameworks"
          plugins_dir="$app_bundle/Contents/PlugIns"
          if [ -d "$frameworks_dir" ]; then
            find "$frameworks_dir" -maxdepth 2 -name "*.framework" -type d -print0 | \
              xargs -0 -I{} codesign --remove-signature "{}" || true
            find "$frameworks_dir" -name "*.dylib" -type f -print0 | \
              xargs -0 -I{} codesign --remove-signature "{}" || true
            find "$frameworks_dir" -maxdepth 2 -name "*.framework" -type d -print0 | \
              xargs -0 -I{} codesign --force --sign - --timestamp=none "{}"
            find "$frameworks_dir" -name "*.dylib" -type f -print0 | \
              xargs -0 -I{} codesign --force --sign - --timestamp=none "{}"
          fi
          if [ -d "$plugins_dir" ]; then
            find "$plugins_dir" -name "*.dylib" -type f -print0 | \
              xargs -0 -I{} codesign --remove-signature "{}" || true
            find "$plugins_dir" -name "*.dylib" -type f -print0 | \
              xargs -0 -I{} codesign --force --sign - --timestamp=none "{}"
          fi
          if [ -f "$main_exe" ]; then
            codesign --force --sign - --timestamp=none "$main_exe"
          fi
          codesign --force --deep --timestamp=none \
            --sign - --entitlements xenia.entitlements "$app_bundle"
          xattr -cr "$app_bundle"

          mkdir -p artifacts/release

          # Create a DMG
          mkdir -p dmg_contents
          cp -R "$app_bundle" dmg_contents/
          cp LICENSE dmg_contents/
          ln -s /Applications dmg_contents/Applications

          hdiutil create -volname "XeniOS" -srcfolder dmg_contents -ov -format UDZO "artifacts/release/xenios_macos_intel.dmg"
          rm -rf dmg_contents

      - name: Upload macOS Intel artifacts
        if: steps.prepare_artifacts.outcome == 'success'
        uses: actions/upload-artifact@main
        with:
          name: xenios_macos_x86_64
          path: artifacts/release
          if-no-files-found: error

  build-windows-x86_64:
    name: Build Windows x86_64
    if: false
    needs: lint
    runs-on: windows-2025
    env:
      POWERSHELL_TELEMETRY_OPTOUT: 1
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          submodules: false

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v3
        with:
          path: |
            build/obj
            build/bin/Windows-x86_64/Release/*.lib
          key: ${{ runner.os }}-x86_64-build-${{ hashFiles('src/**', 'premake5.lua', 'third_party/**/*.lua') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-build-

      - name: Cache Vulkan SDK
        id: cache-vulkan-sdk
        uses: actions/cache@v3
        with:
          path: C:\VulkanSDK
          key: ${{ runner.os }}-vulkan-sdk-${{ hashFiles('**/vulkan-sdk.exe') }}
          restore-keys: |
            ${{ runner.os }}-vulkan-sdk-

      - name: Cache Qt6
        id: cache-qt
        uses: actions/cache@v3
        with:
          path: C:\Qt
          key: ${{ runner.os }}-qt6-6.10.1
          restore-keys: |
            ${{ runner.os }}-qt6-

      - name: Cache submodules
        id: cache-submodules
        uses: actions/cache@v3
        with:
          path: |
            third_party
            .git/modules/third_party
          key: ${{ runner.os }}-submodules-${{ hashFiles('.gitmodules') }}-${{ hashFiles('.git/modules/third_party/*/HEAD') }}

      - name: Setup
        run: |
          # Install Vulkan SDK which includes spirv-tools
          if (Test-Path -Path "C:\VulkanSDK") {
            echo "Vulkan SDK found in cache."
          } else {
            Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe" -OutFile "vulkan-sdk.exe"
            Start-Process -FilePath "vulkan-sdk.exe" -ArgumentList "--accept-licenses", "--default-answer", "--confirm-command", "install" -Wait
          }
          $env:VULKAN_SDK = "C:\VulkanSDK\$(Get-ChildItem -Path 'C:\VulkanSDK' -Directory | Select-Object -First 1 -ExpandProperty Name)"
          $env:PATH = "$env:VULKAN_SDK\Bin;$env:PATH"
          echo "VULKAN_SDK=$env:VULKAN_SDK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "$env:VULKAN_SDK\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          # Verify shader tools are available
          $spirvOptPath = "$env:VULKAN_SDK\Bin\spirv-opt.exe"
          if (Test-Path $spirvOptPath) {
            & $spirvOptPath --version
            echo "spirv-opt found at: $spirvOptPath"
          } else {
            echo "Warning: spirv-opt.exe not found at expected location"
          }

          $glslangPath = "$env:VULKAN_SDK\Bin\glslangValidator.exe"
          if (Test-Path $glslangPath) {
            & $glslangPath --version
            echo "glslangValidator found at: $glslangPath"
          } else {
            echo "Warning: glslangValidator.exe not found at expected location"
          }

          $spirvDisPath = "$env:VULKAN_SDK\Bin\spirv-dis.exe"
          if (Test-Path $spirvDisPath) {
            echo "spirv-dis found at: $spirvDisPath"
          } else {
            echo "Warning: spirv-dis.exe not found at expected location"
          }

          # Verify FXC is available (from Windows SDK)
          $fxcPaths = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\fxc.exe" -ErrorAction SilentlyContinue | Sort-Object FullName
          if ($fxcPaths) {
            $fxcPath = $fxcPaths[-1].FullName
            echo "FXC found at: $fxcPath"
          } else {
            echo "Warning: fxc.exe not found in Windows SDK"
          }

          # Install Qt6
          $qtCacheHit = '${{ steps.cache-qt.outputs.cache-hit }}'
          if ($qtCacheHit -ne 'true') {
            pip install aqtinstall
            aqt install-qt windows desktop 6.10.1 win64_msvc2022_64 -O C:\Qt
          }

          # Always run submodule update - it's fast if already present from cache
          # This ensures any newly added submodules are fetched even with cache hit
          git submodule update --init --depth=1 -j $env:NUMBER_OF_PROCESSORS (Select-String -CaseSensitive '(?<=path = )(?!third_party\/(premake-(androidndk|cmake|export-compile-commands))).+' .gitmodules).Matches.Value

          # DirectXShaderCompiler has nested submodules needed for dxilconv
          git -C third_party/DirectXShaderCompiler submodule update --init --depth=1 external/SPIRV-Headers external/SPIRV-Tools

          # Fetch data repos (game-patches, optimized-settings)
          python xenia-build.py fetchdata

      - name: Build
        run: python xenia-build.py build --config=Release --target=xenia-app
      - name: Prepare artifacts
        id: prepare_artifacts
        run: |
          $binary = 'build\bin\Windows-x86_64\Release\xenios.exe'
          if ((get-item $binary).Length -le 100000) {
            echo "::error::$binary is too small."
          }
          robocopy . build\bin\Windows-x86_64\Release LICENSE /r:0 /w:0
          # Copy all files and directories (Qt DLLs, plugins, etc.) excluding build artifacts
          robocopy build\bin\Windows-x86_64\Release artifacts\xenios /MIR /r:0 /w:0 /XF *.lib *.idb *.exp /XD generic iconengines imageformats networkinformation styles tls
          If ($LastExitCode -le 7) { echo "LastExitCode = $LastExitCode";$LastExitCode = 0 }
      - name: Upload Xenios Windows artifacts
        if: steps.prepare_artifacts.outcome == 'success'
        uses: actions/upload-artifact@main
        with:
          name: xenios_windows_x86_64
          path: artifacts\xenios
          if-no-files-found: error
