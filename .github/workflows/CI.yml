name: CI

on:
  push:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

# No workflow-level `permissions:` block; each job declares its own minimum
# set explicitly. Workflow-level restrictions can cap job-level overrides in
# ways that break release creation, so this keeps the release job's
# `contents: write` intact while still locking sccache down to read-only on
# non-edge branches.

jobs:
  # Trusted builds: pushes to edge can write to the sccache cache.
  build-trusted:
    name: Build
    if: github.ref == 'refs/heads/edge'
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/build.yml

  # Read-only builds: feature branches, PRs, and anything else. sccache
  # reads from edge's cache via the default-branch fallback but cannot
  # write new entries.
  build-readonly:
    name: Build
    if: github.ref != 'refs/heads/edge'
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/build.yml

  release:
    name: Create Release
    needs: build-trusted
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      github.repository == 'has207/xenia-edge' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/edge'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Linux artifacts
        uses: actions/download-artifact@main
        with:
          name: xenia_edge_linux
          path: linux_artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@main
        with:
          name: xenia_edge_windows
          path: windows_artifacts

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Create zips
          cd linux_artifacts
          # For Linux, just rename the AppImage (no need to zip a single file)
          mv xenia_edge.AppImage ../xenia_edge_linux.AppImage
          cd ../windows_artifacts
          7z a ../xenia_edge_windows.zip * -xr!'*.pdb' -mx9 -bb3
          cd ..

          # Build release body: commit list since last release + compare URL
          tag=${GITHUB_SHA::7}
          prev_tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          prev_sha=""
          if [ -n "$prev_tag" ]; then
            prev_sha=$(git rev-parse "${prev_tag}^{}" 2>/dev/null || git rev-parse "$prev_tag" 2>/dev/null || echo "")
          fi
          {
            if [ -n "$prev_sha" ]; then
              echo "### Changes"
              echo ""
              git log --format="- %s (\`%h\`)" --abbrev=7 "${prev_sha}..${GITHUB_SHA}" --
              echo ""
              echo "**Full changelog**: https://github.com/${GH_REPO}/compare/${prev_tag}...${tag}"
            else
              echo "### Changes"
              echo ""
              git log --format="- %s (\`%h\`)" --abbrev=7 -1 "${GITHUB_SHA}" --
            fi
          } > release_notes.md

          # Create release
          gh release create $tag xenia_edge_linux.AppImage xenia_edge_windows.zip \
            --target $GITHUB_SHA -t "xenia_edge" --notes-file release_notes.md
