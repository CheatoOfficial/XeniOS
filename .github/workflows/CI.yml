name: CI

on:
  push:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@main
      - name: Setup
        env:
          LLVM_VERSION: 21
        run: |
          UBUNTU_BASE=$(lsb_release -cs)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo apt-add-repository "deb http://apt.llvm.org/${UBUNTU_BASE}/ llvm-toolchain-${UBUNTU_BASE}-$LLVM_VERSION main"
          sudo apt-get -y update
          sudo apt-get -y install clang-format-$LLVM_VERSION
      - name: Lint
        run: ./xenia-build.py lint --all

  build-linux-x86_64:
    name: Build Linux x86_64
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Cache premake5
        id: cache-premake5
        uses: actions/cache@main
        with:
          path: tools/build/bin/premake5
          key: ${{ runner.os }}-premake5-${{ hashFiles('third_party/premake-core/**') }}

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v3
        with:
          path: build/build_release
          key: ${{ runner.os }}-x86_64-ninja-${{ hashFiles('src/**', 'premake5.lua', 'third_party/**/*.lua') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-ninja-

      - name: Cache Qt6
        id: cache-qt-linux
        uses: actions/cache@v3
        with:
          path: /opt/Qt
          key: ${{ runner.os }}-qt6-6.10.1
          restore-keys: |
            ${{ runner.os }}-qt6-

      - name: Cache linuxdeploy tools
        id: cache-linuxdeploy
        uses: actions/cache@v3
        with:
          path: ~/linuxdeploy
          key: ${{ runner.os }}-linuxdeploy-tools
          restore-keys: |
            ${{ runner.os }}-linuxdeploy-

      - name: Cache submodules
        id: cache-submodules-linux
        uses: actions/cache@v3
        with:
          path: |
            third_party
            .git/modules/third_party
          key: ${{ runner.os }}-${{ runner.arch }}-submodules-${{ hashFiles('.gitmodules') }}-${{ hashFiles('.git/modules/third_party/*/HEAD') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-submodules-

      - name: Cache Vulkan SDK
        id: cache-vulkan-sdk-linux
        uses: actions/cache@v3
        with:
          path: ~/vulkan-sdk
          key: ${{ runner.os }}-vulkan-sdk-latest

      - name: Setup
        run: |
          UBUNTU_BASE=$(lsb_release -cs)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo apt-add-repository "deb http://apt.llvm.org/${UBUNTU_BASE}/ llvm-toolchain-${UBUNTU_BASE}-21 main"

          sudo apt-get -y update
          sudo apt-get -y install mesa-vulkan-drivers valgrind libc++-dev libc++abi-dev libsdl2-dev libvulkan-dev libx11-xcb-dev clang-21 ninja-build spirv-tools libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-cursor0 libxcb-shape0 libfontconfig1-dev libxtst-dev

          # Install Vulkan SDK
          if [ '${{ steps.cache-vulkan-sdk-linux.outputs.cache-hit }}' != 'true' ]; then
            wget -qO vulkan-sdk.tar.xz https://sdk.lunarg.com/sdk/download/latest/linux/vulkan-sdk.tar.xz
            mkdir -p ~/vulkan-sdk
            tar -xf vulkan-sdk.tar.xz -C ~/vulkan-sdk
          fi
          VULKAN_SDK_VERSION=$(ls ~/vulkan-sdk)
          echo "VULKAN_SDK=$HOME/vulkan-sdk/$VULKAN_SDK_VERSION/x86_64" >> $GITHUB_ENV
          echo "$HOME/vulkan-sdk/$VULKAN_SDK_VERSION/x86_64/bin" >> $GITHUB_PATH

          # Install Qt 6.10.1 via aqtinstall
          if [ '${{ steps.cache-qt-linux.outputs.cache-hit }}' != 'true' ]; then
            pip install aqtinstall
            echo "Available architectures for Qt 6.10.1:"
            aqt list-qt linux desktop --arch 6.10.1 || true
            aqt install-qt linux desktop 6.10.1 linux_gcc_64 -O /opt/Qt
          fi
          export PATH="/opt/Qt/6.10.1/gcc_64/bin:$PATH"
          export CMAKE_PREFIX_PATH="/opt/Qt/6.10.1/gcc_64"
          export PKG_CONFIG_PATH="/opt/Qt/6.10.1/gcc_64/lib/pkgconfig:$PKG_CONFIG_PATH"
          export QT_DIR="/opt/Qt/6.10.1/gcc_64"
          echo "/opt/Qt/6.10.1/gcc_64/bin" >> $GITHUB_PATH
          echo "CMAKE_PREFIX_PATH=/opt/Qt/6.10.1/gcc_64" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/opt/Qt/6.10.1/gcc_64/lib/pkgconfig" >> $GITHUB_ENV
          echo "QT_DIR=/opt/Qt/6.10.1/gcc_64" >> $GITHUB_ENV

          # Download linuxdeploy tools if not cached
          if [ '${{ steps.cache-linuxdeploy.outputs.cache-hit }}' != 'true' ]; then
            mkdir -p ~/linuxdeploy
            wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O ~/linuxdeploy/linuxdeploy
            wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage -O ~/linuxdeploy/linuxdeploy-plugin-qt
            wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage -O ~/linuxdeploy/linuxdeploy-plugin-appimage
            chmod +x ~/linuxdeploy/linuxdeploy ~/linuxdeploy/linuxdeploy-plugin-qt ~/linuxdeploy/linuxdeploy-plugin-appimage
          fi
          echo "$HOME/linuxdeploy" >> $GITHUB_PATH

          # Verify shader tools are available
          which glslangValidator && glslangValidator --version || echo "Warning: glslangValidator not found"
          which spirv-opt && spirv-opt --version || echo "Warning: spirv-opt not found"
          which spirv-dis || echo "Warning: spirv-dis not found"

          # Always update submodules so .git/modules is present even on cache hit
          git submodule update --init --depth=1 -j$(getconf _NPROCESSORS_ONLN) $(grep -oP '(?<=path = )(?!third_party\/(DirectXShaderCompiler|premake-(androidndk|export-compile-commands))).+' .gitmodules)

          # Always run premake to regenerate cmake files (lua files may have changed)
          if [ '${{ steps.cache-premake5.outputs.cache-hit }}' != 'true' ]; then
            ./xenia-build.py premake
            cp third_party/premake-core/bin/release/premake5 tools/build/bin
          else
            ./xenia-build.py premake
          fi

          # Fetch data repos (game-patches, optimized-settings)
          ./xenia-build.py fetchdata
      - name: Build
        env:
          CC: clang-21
          CXX: clang++-21
        run: ./xenia-build.py build --config=Release
      - name: Prepare artifacts
        id: prepare_artifacts
        run: |
          binary=build/bin/Linux-x86_64/Release/xenia_edge
          if [ $(stat -c%s $binary) -le 100000 ]; then
            echo "::error::Binary is too small."
          fi
          chmod +x $binary
          mkdir -p artifacts/xenia_edge

          # Use linuxdeploy to bundle Qt dependencies
          export QMAKE=/opt/Qt/6.10.1/gcc_64/bin/qmake
          export LD_LIBRARY_PATH=/opt/Qt/6.10.1/gcc_64/lib:$LD_LIBRARY_PATH

          # Install icons with proper naming for linuxdeploy
          mkdir -p artifacts/xenia_edge/usr/share/icons/hicolor/16x16/apps
          mkdir -p artifacts/xenia_edge/usr/share/icons/hicolor/32x32/apps
          mkdir -p artifacts/xenia_edge/usr/share/icons/hicolor/48x48/apps
          mkdir -p artifacts/xenia_edge/usr/share/icons/hicolor/64x64/apps
          mkdir -p artifacts/xenia_edge/usr/share/icons/hicolor/128x128/apps
          mkdir -p artifacts/xenia_edge/usr/share/icons/hicolor/256x256/apps
          mkdir -p artifacts/xenia_edge/usr/share/icons/hicolor/512x512/apps
          mkdir -p artifacts/xenia_edge/usr/share/icons/hicolor/1024x1024/apps

          cp assets/icon/16.png artifacts/xenia_edge/usr/share/icons/hicolor/16x16/apps/xenia_edge.png
          cp assets/icon/32.png artifacts/xenia_edge/usr/share/icons/hicolor/32x32/apps/xenia_edge.png
          cp assets/icon/48.png artifacts/xenia_edge/usr/share/icons/hicolor/48x48/apps/xenia_edge.png
          cp assets/icon/64.png artifacts/xenia_edge/usr/share/icons/hicolor/64x64/apps/xenia_edge.png
          cp assets/icon/128.png artifacts/xenia_edge/usr/share/icons/hicolor/128x128/apps/xenia_edge.png
          cp assets/icon/256.png artifacts/xenia_edge/usr/share/icons/hicolor/256x256/apps/xenia_edge.png
          cp assets/icon/512.png artifacts/xenia_edge/usr/share/icons/hicolor/512x512/apps/xenia_edge.png
          cp assets/icon/1024.png artifacts/xenia_edge/usr/share/icons/hicolor/1024x1024/apps/xenia_edge.png

          # Copy all necessary files (excluding build artifacts) next to the binary in AppDir
          mkdir -p artifacts/xenia_edge/usr/bin
          # Copy directories (optimized_settings, game_patches, etc.)
          find build/bin/Linux-x86_64/Release -maxdepth 1 -type d ! -name Release -exec cp -r {} artifacts/xenia_edge/usr/bin/ \;
          # Copy any additional runtime files if needed (currently just directories are copied)

          # Run linuxdeploy with Qt plugin to deploy all Qt dependencies and create AppImage
          export EXTRA_PLATFORM_PLUGINS="libqwayland.so"
          ~/linuxdeploy/linuxdeploy --appdir artifacts/xenia_edge \
            --executable $binary \
            --desktop-file assets/xenia_edge.desktop \
            --icon-file assets/icon/256.png \
            --plugin qt \
            --output appimage

          # linuxdeploy creates the AppImage in the current directory
          # Find and rename it to a standard name
          appimage_file=$(ls -1 *.AppImage | head -n1)
          if [ -z "$appimage_file" ]; then
            echo "::error::AppImage file not found after linuxdeploy"
            exit 1
          fi

          # Create final artifacts directory and move the AppImage there
          mkdir -p artifacts/release
          mv "$appimage_file" artifacts/release/xenia_edge.AppImage
          chmod +x artifacts/release/xenia_edge.AppImage

          # Also copy LICENSE
          cp LICENSE artifacts/release/
      - name: Upload xenia edge artifacts
        if: steps.prepare_artifacts.outcome == 'success'
        uses: actions/upload-artifact@main
        with:
          name: xenia_edge_linux_x86_64
          path: artifacts/release
          if-no-files-found: error

  build-macos-arm64:
    name: Build macOS ARM64
    needs: lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Cache premake5
        id: cache-premake5
        uses: actions/cache@main
        with:
          path: tools/build/bin/premake5
          key: ${{ runner.os }}-premake5-${{ hashFiles('third_party/premake-core/**') }}

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v3
        with:
          path: build/DerivedData
          key: ${{ runner.os }}-ARM64-deriveddata-${{ hashFiles('src/**', 'premake5.lua', 'third_party/**/*.lua') }}
          restore-keys: |
            ${{ runner.os }}-ARM64-deriveddata-

      - name: Cache Qt6
        id: cache-qt-macos
        uses: actions/cache@v3
        with:
          path: ~/Qt
          key: ${{ runner.os }}-qt6-6.10.1
          restore-keys: |
            ${{ runner.os }}-qt6-

      - name: Cache submodules
        id: cache-submodules-macos
        uses: actions/cache@v3
        with:
          path: |
            third_party
            .git/modules/third_party
          key: ${{ runner.os }}-${{ runner.arch }}-submodules-${{ hashFiles('.gitmodules') }}-${{ hashFiles('.git/modules/third_party/*/HEAD') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-submodules-

      - name: Setup
        run: |
          retry() {
            local n=0
            until "$@"; do
              n=$((n+1))
              if [ $n -ge 5 ]; then
                return 1
              fi
              sleep 5
            done
          }

          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60
          git config --global http.postBuffer 524288000

          # Install dependencies via Homebrew
          brew install sdl2 ninja pipx

          # Install Qt 6.10.1 via aqtinstall
          if [ '${{ steps.cache-qt-macos.outputs.cache-hit }}' != 'true' ]; then
            pipx install aqtinstall
            pipx ensurepath
            export PATH="$HOME/.local/bin:$PATH"
            aqt install-qt mac desktop 6.10.1 clang_64 -O ~/Qt
          fi
          export PATH="$HOME/Qt/6.10.1/macos/bin:$PATH"
          export CMAKE_PREFIX_PATH="$HOME/Qt/6.10.1/macos"
          export QT_DIR="$HOME/Qt/6.10.1/macos"
          echo "$HOME/Qt/6.10.1/macos/bin" >> $GITHUB_PATH
          echo "CMAKE_PREFIX_PATH=$HOME/Qt/6.10.1/macos" >> $GITHUB_ENV
          echo "QT_DIR=$HOME/Qt/6.10.1/macos" >> $GITHUB_ENV

          # Always update submodules so .git/modules is present even on cache hit
          retry git submodule update --init --depth=1 -j$(sysctl -n hw.ncpu) $(grep -oE 'path = .+' .gitmodules | sed 's/path = //' | grep -v 'premake-androidndk\|premake-export-compile-commands')
          # DirectXShaderCompiler has nested submodules needed for dxilconv
          retry git -C third_party/DirectXShaderCompiler submodule update --init --depth=1 external/SPIRV-Headers external/SPIRV-Tools

          if [ '${{ steps.cache-premake5.outputs.cache-hit }}' != 'true' ]; then
            ./xenia-build.py premake
            cp third_party/premake-core/bin/release/premake5 tools/build/bin
          else
            ./xenia-build.py premake
          fi

          # Fetch data repos (game-patches, optimized-settings)
          ./xenia-build.py fetchdata

      - name: Build
        run: ./xenia-build.py build --config=Release --target=xenia-app

      - name: Prepare artifacts
        id: prepare_artifacts
        run: |
          app_bundle=""
          for candidate in \
            build/bin/Mac-ARM64/Release/Xenia-Edge.app \
            build/bin/Mac-ARM64/Release/Xenia.app \
            build/bin/Mac-ARM64/Release/xenia_edge.app; do
            if [ -d "$candidate" ]; then
              app_bundle="$candidate"
              break
            fi
          done

          if [ -z "$app_bundle" ]; then
            echo "::error::App bundle not found in build/bin/Mac-ARM64/Release"
            exit 1
          fi

          target_bundle="build/bin/Mac-ARM64/Release/Xenia-Edge.app"
          if [ "$app_bundle" != "$target_bundle" ]; then
            rm -rf "$target_bundle"
            mv "$app_bundle" "$target_bundle"
            app_bundle="$target_bundle"
          fi

          mkdir -p "$app_bundle/Contents/Resources"
          cp -f assets/icon/xenia.icns "$app_bundle/Contents/Resources/"

          macdeployqt="$HOME/Qt/6.10.1/macos/bin/macdeployqt"
          if [ -x "$macdeployqt" ]; then
            "$macdeployqt" "$app_bundle" -always-overwrite -verbose=2 \
              -libpath=third_party/metal-shader-converter/lib \
              -libpath=third_party/DirectXShaderCompiler/build_dxilconv_macos/lib \
              -libpath=/opt/homebrew/opt/sdl2/lib \
              -libpath=/usr/local/opt/sdl2/lib
          else
            echo "::warning::macdeployqt not found at $macdeployqt"
          fi

          if [ -f third_party/metal-shader-converter/lib/libmetalirconverter.dylib ]; then
            cp -f third_party/metal-shader-converter/lib/libmetalirconverter.dylib \
              "$app_bundle/Contents/Frameworks/" || true
          fi
          if [ -f third_party/DirectXShaderCompiler/build_dxilconv_macos/lib/libdxilconv.dylib ]; then
            cp -f third_party/DirectXShaderCompiler/build_dxilconv_macos/lib/libdxilconv.dylib \
              "$app_bundle/Contents/Frameworks/" || true
          fi

          main_exe="$app_bundle/Contents/MacOS/xenia_edge"
          if [ -f "$main_exe" ]; then
            codesign --remove-signature "$main_exe" || true
          fi
          codesign --remove-signature "$app_bundle" || true
          frameworks_dir="$app_bundle/Contents/Frameworks"
          plugins_dir="$app_bundle/Contents/PlugIns"
          if [ -d "$frameworks_dir" ]; then
            find "$frameworks_dir" -maxdepth 2 -name "*.framework" -type d -print0 | \
              xargs -0 -I{} codesign --remove-signature "{}" || true
            find "$frameworks_dir" -name "*.dylib" -type f -print0 | \
              xargs -0 -I{} codesign --remove-signature "{}" || true
            find "$frameworks_dir" -maxdepth 2 -name "*.framework" -type d -print0 | \
              xargs -0 -I{} codesign --force --sign - --timestamp=none "{}"
            find "$frameworks_dir" -name "*.dylib" -type f -print0 | \
              xargs -0 -I{} codesign --force --sign - --timestamp=none "{}"
          fi
          if [ -d "$plugins_dir" ]; then
            find "$plugins_dir" -name "*.dylib" -type f -print0 | \
              xargs -0 -I{} codesign --remove-signature "{}" || true
            find "$plugins_dir" -name "*.dylib" -type f -print0 | \
              xargs -0 -I{} codesign --force --sign - --timestamp=none "{}"
          fi
          if [ -f "$main_exe" ]; then
            codesign --force --sign - --timestamp=none "$main_exe"
          fi
          codesign --force --deep --timestamp=none \
            --sign - --entitlements xenia.entitlements "$app_bundle"
          xattr -cr "$app_bundle"

          mkdir -p artifacts/release

          # Create a DMG
          mkdir -p dmg_contents
          cp -R "$app_bundle" dmg_contents/
          cp LICENSE dmg_contents/
          ln -s /Applications dmg_contents/Applications

          hdiutil create -volname "Xenia-Edge" -srcfolder dmg_contents -ov -format UDZO "artifacts/release/xenia_edge_macos.dmg"
          rm -rf dmg_contents

      - name: Upload xenia edge artifacts
        if: steps.prepare_artifacts.outcome == 'success'
        uses: actions/upload-artifact@main
        with:
          name: xenia_edge_macos_arm64
          path: artifacts/release
          if-no-files-found: error

  build-ios-arm64:
    name: Build iOS ARM64
    needs: lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Cache premake5
        id: cache-premake5
        uses: actions/cache@main
        with:
          path: tools/build/bin/premake5
          key: ${{ runner.os }}-premake5-${{ hashFiles('third_party/premake-core/**') }}

      - name: Cache build output
        id: cache-build-ios
        uses: actions/cache@v3
        with:
          path: build/DerivedData
          key: ${{ runner.os }}-ios-deriveddata-${{ hashFiles('src/**', 'premake5.lua', 'third_party/**/*.lua') }}
          restore-keys: |
            ${{ runner.os }}-ios-deriveddata-

      - name: Cache submodules
        id: cache-submodules-ios
        uses: actions/cache@v3
        with:
          path: |
            third_party
            .git/modules/third_party
          key: ${{ runner.os }}-${{ runner.arch }}-submodules-ios-v2-${{ hashFiles('.gitmodules') }}-${{ hashFiles('.git/modules/third_party/*/HEAD') }}

      - name: Setup
        env:
          XE_TARGET_IOS: "1"
        run: |
          retry() {
            local n=0
            until "$@"; do
              n=$((n+1))
              if [ $n -ge 5 ]; then
                return 1
              fi
              sleep 5
            done
          }

          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60
          git config --global http.postBuffer 524288000

          # No SDL2/Qt/Vulkan needed for iOS library builds
          brew install ninja

          # Update submodules (no DirectXShaderCompiler needed for iOS)
          retry git submodule update --init --depth=1 -j$(sysctl -n hw.ncpu) $(grep -oE 'path = .+' .gitmodules | sed 's/path = //' | grep -v 'premake-androidndk\|premake-export-compile-commands\|DirectXShaderCompiler')

          # Remove any stale premake5 binary left in the submodule tree by
          # a previous cache run.  premake.py checks this path first and
          # would use an outdated binary that doesn't support --os=ios.
          rm -f third_party/premake-core/bin/release/premake5

          # Build premake5 as a macOS host tool if not cached, then generate
          # iOS project files.
          mkdir -p tools/build/bin
          if [ '${{ steps.cache-premake5.outputs.cache-hit }}' != 'true' ]; then
            # Build premake5 from source (host macOS binary).
            cd third_party/premake-core
            make -f Bootstrap.mak PLATFORM=ARM64 osx
            cd ../..
            cp third_party/premake-core/bin/release/premake5 tools/build/bin/
            chmod +x tools/build/bin/premake5
            echo "premake5 built and copied to tools/build/bin/"
          else
            echo "premake5 restored from cache"
          fi
          # Verify premake5 is usable before proceeding.
          if [ ! -x tools/build/bin/premake5 ]; then
            echo "ERROR: tools/build/bin/premake5 not found or not executable"
            ls -la tools/build/bin/ || true
            exit 1
          fi
          tools/build/bin/premake5 --version

          # Create a sentinel file so premake Lua scripts can reliably
          # detect an iOS build even if --os=ios handling is broken.
          touch .ios_target
          ./xenia-build.py premake --target_os=ios

      - name: Build
        run: |
          # Build the full iOS app target (no code signing on CI).
          # Use --no_premake since premake was already run in the Setup step.
          ./xenia-build.py build --config=Release --target_os=ios --no_premake -- CODE_SIGNING_ALLOWED=NO

